# RTK pose bridge
prefer_bestutm: true
allow_inspvax_position_fallback: true
allow_float_solution: false
position_timeout: 0.50
heading_timeout: 0.50
max_position_stddev: 0.10
max_heading_stddev_deg: 2.0
publish_rate: 20.0
yaw_offset_deg: 0.0

# replay controller
# 默认正式使用两点打点直线倒车；多点轨迹模式仅作为备用。
tracking_mode: line

# 小角度优先默认参数：先稳住底盘，不追求大横差强行纠偏。
reverse_speed: 0.10
max_angular_speed: 0.08
enable_global_angular_slew: true
max_angular_accel: 0.10
enable_speed_based_angular_limit: true
min_turn_radius_m: 1.60

goal_tolerance: 0.20
goal_yaw_tolerance_deg: 20.0
require_goal_yaw: false
control_rate: 15.0
publish_zero_on_idle: true
pose_timeout: 0.60
startup_max_distance: 0.50
startup_heading_tolerance_deg: 12.0
runtime_heading_limit_deg: 60.0
k_heading: 0.75
k_cross_track: 0.18
max_cross_track_error: 0.40

# 自动倒车因横向/航向误差过大暂停后，人工调回轨迹附近允许继续接入的阈值
resume_max_cross_track_error: 0.25
resume_heading_tolerance_deg: 18.0
resume_projection_margin_m: 0.30

waypoint_reach_tolerance: 0.30
enable_projection_segment_advance: true
segment_advance_ratio: 0.90
enable_nearest_segment_recovery: true
segment_search_ahead: 12
segment_recovery_min_improve: 0.08
waypoint_tolerance_segment_ratio: 0.60
waypoint_min_reach_tolerance: 0.08

# recording
record_point_spacing: 0.30
record_yaw_spacing_deg: 4.0
record_yaw_min_distance: 0.10
enable_path_dedup: true
path_dedup_spacing: 0.05
path_dedup_yaw_keep_deg: 2.0
line_resample_spacing: 0.20
path_resample_spacing: 0.20
smooth_window: 1

# segmented pause / relay
# 分段停车只作为外层停车管理，不改变两点/多点轨迹控制主逻辑。
enable_segment_pause: true
pause_distance_m: 0.30
pause_duration_s: 3.0
pause_smooth_stop_s: 0.80
pause_smooth_start_s: 1.20
pause_skip_near_goal_m: 0.35

# 停车角度保持 + 起步渐进纠偏
hold_yaw_during_pause: true
pause_hold_yaw_average_s: 0.30
pause_heading_k: 0.35
pause_heading_max_angular_speed: 0.03
resume_straight_time_s: 0.60
resume_cross_track_ramp_s: 1.20
pause_resume_max_angular_speed: 0.05
resume_disable_cross_track_first: true

enable_angular_slew_in_pause: true
max_pause_angular_accel: 0.06
# 兼容旧参数，当前版本主要使用 pause_resume_max_angular_speed
pause_start_angular_limit: 0.03

# USB relay
enable_relay: true
relay_port: auto
relay_baudrate: 9600
relay_pulse_seconds: 2.0
relay_serial_timeout: 1.0
relay_on_hex: "A0 01 01 A2"
relay_off_hex: "A0 01 00 A1"

# CSV export / import
path_dir: /home/agx/rtk_reverse_paths
path_file: ""
path_prefix: rtk_reverse_path
import_path_file: ""
